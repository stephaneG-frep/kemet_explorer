name: kemet_explorer
description: "Application mobile pédagogique sur la mythologie et l'histoire de l'Égypte antique."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.5.3
  url_launcher: ^6.3.1
  printing: ^5.13.4
  pdf: ^3.11.1
  flutter_tts: ^4.2.2
  audioplayers: ^6.1.0
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/sounds/
    - assets/videos/
